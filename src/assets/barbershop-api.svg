<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img"
    aria-labelledby="title desc">
    <title id="title">barbershop-api harmony project preview</title>
    <desc id="desc">Stylized screenshot preview for a C# API focused on barbershop harmony champions
        data.</desc>
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0f172a" />
